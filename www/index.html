<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FFF0F5">
    
    <title>Nicole's Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* LIGHT THEME */
            --bg-body: #FFF0F5;
            --surface: #FFFFFF;
            --surface-glass: rgba(255, 255, 255, 0.85);
            --primary: #E91E63;
            --primary-soft: #FCE4EC;
            --text-main: #2D2D2D;
            --text-sub: #757575;
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-card: 0 15px 35px rgba(233, 30, 99, 0.1);
            --dot-active: #E91E63;
            --dot-inactive: #E0E0E0;
        }

        [data-theme="dark"] {
            /* DARK THEME */
            --bg-body: #121212;
            --surface: #1E1E1E;
            --surface-glass: rgba(30, 30, 30, 0.85);
            --primary: #FF80AB;
            --primary-soft: #2D1F25;
            --text-main: #FFFFFF;
            --text-sub: #A0A0A0;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 30px rgba(0,0,0,0.5);
            --shadow-card: 0 15px 35px rgba(0,0,0,0.4);
            --dot-active: #FF80AB;
            --dot-inactive: #444444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease, color 0.3s; }
        
        body { 
            background: var(--bg-body); 
            min-height: 100vh; overflow-x: hidden; color: var(--text-main); 
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- LAVA LAMP BACKGROUND --- */
        .lava-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: var(--bg-body); transition: background 0.5s; }
        .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.6; animation: float 10s infinite alternate; will-change: transform; }
        .blob-1 { background: #ff9a9e; width: 300px; height: 300px; top: -10%; left: -10%; animation-duration: 12s; }
        .blob-2 { background: #a18cd1; width: 250px; height: 250px; bottom: -10%; right: -10%; animation-duration: 15s; }
        [data-theme="dark"] .blob-1 { background: #5c182e; opacity: 0.4; }
        [data-theme="dark"] .blob-2 { background: #2e185c; opacity: 0.4; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(40px, 60px); } }

        /* UTILS */
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s forwards; }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* GENERIC BUTTON STYLES */
        .icon-btn { 
            background: transparent; border: none; width: 44px; height: 44px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; color: var(--text-main); font-size: 1.2rem;
            transition: background 0.2s;
        }
        .icon-btn:active { background: rgba(0,0,0,0.05); }

        /* --- LOGIN --- */
        #login-view { position: fixed; inset: 0; z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--surface-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 40px 30px; border-radius: 32px; width: 100%; max-width: 360px; border: 1px solid var(--border); }
        .logo-circle { width: 80px; height: 80px; background: var(--primary-soft); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
        .logo-circle svg { width: 40px; height: 40px; stroke-width: 2.5; }
        .styled-input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid var(--border); background: rgba(255,255,255,0.5); font-size: 16px; color: var(--text-main); }
        [data-theme="dark"] .styled-input { background: rgba(0,0,0,0.3); }
        .styled-input:focus { border-color: var(--primary); background: var(--surface); }
        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: transform 0.2s; }
        .exclusive-badge { margin-top: 25px; background: rgba(125,125,125,0.1); border: 1px dashed var(--primary); color: var(--primary); padding: 10px; border-radius: 10px; font-size: 10px; font-weight: 700; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }

        /* --- MAIN APP --- */
        #app-view { min-height: 100vh; display: none; padding-bottom: 40px; }
        .app-nav { 
            background: var(--surface-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border);
            padding-top: calc(15px + env(safe-area-inset-top));
        }
        .nav-actions { display: flex; gap: 8px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .hero-section { margin: 20px 0 30px; }
        .hero-title { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .search-bar { background: var(--surface-glass); backdrop-filter: blur(10px); border-radius: 18px; padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
        .search-bar input { border: none; width: 100%; font-size: 16px; background: transparent; color: var(--text-main); outline: none; }
        .card { background: var(--surface-glass); border-radius: 22px; padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow); cursor: pointer; border: 1px solid var(--border); display: flex; gap: 15px; align-items: center; }
        .list-icon { width: 50px; height: 50px; border-radius: 16px; background: var(--primary-soft); color: var(--primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* --- READER (FIXED) --- */
        #reader-view { 
            position: fixed; inset: 0; background: var(--bg-body); z-index: 2000; 
            transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); 
            display: flex; flex-direction: column; 
        }
        #reader-view.open { transform: translateX(0); }
        
        .reader-header { 
            position: absolute; top: 0; left: 0; right: 0;
            padding: 10px 20px; 
            padding-top: calc(15px + env(safe-area-inset-top));
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--surface-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 10;
            height: calc(70px + env(safe-area-inset-top));
        }
        
        .reader-scroll-area { 
            flex: 1; overflow-y: auto; 
            padding-top: calc(90px + env(safe-area-inset-top)); 
            padding-bottom: 40px; padding-left: 20px; padding-right: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .letter-card-display { 
            background: var(--surface); border-radius: 36px; padding: 40px 30px; 
            width: 100%; max-width: 450px; box-shadow: var(--shadow); 
            text-align: center; border: 1px solid var(--border); 
            margin-bottom: 20px; transform: translateZ(0);
        }
        
        .card-icon-large { 
            width: 80px; height: 80px; background: var(--primary-soft); 
            color: var(--primary); border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; margin: 0 auto 25px; 
        }
        .card-icon-large svg { width: 40px; height: 40px; stroke-width: 2.5; stroke: currentColor; }
        
        .letter-tag { display: inline-block; background: var(--primary-soft); color: var(--primary); padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 20px; }
        .letter-title-large { font-size: 24px; font-weight: 800; margin-bottom: 20px; line-height: 1.3; color: var(--text-main); }
        .letter-body-text { font-family: 'Lora', serif; font-size: 18px; line-height: 1.8; color: var(--text-sub); margin-bottom: 30px; text-align: left; white-space: pre-wrap; }
        .letter-footer { font-size: 13px; font-weight: 600; color: var(--text-sub); opacity: 0.7; border-top: 1px solid var(--border); padding-top: 20px; }
        
        .reader-controls { 
            padding: 20px 30px; padding-bottom: calc(20px + env(safe-area-inset-bottom));
            display: flex; align-items: center; justify-content: space-between; 
            background: var(--surface-glass); border-top: 1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .control-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-main); padding: 12px 24px; border-radius: 14px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .control-btn:disabled { opacity: 0.5; }
        .pagination-dots { display: flex; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dot-inactive); transition: 0.3s; }
        .dot.active { background: var(--dot-active); transform: scale(1.3); }
    </style>
</head>
<body>

    <div class="lava-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="login-view">
        <div style="position:absolute; top:20px; right:20px; z-index:100; padding-top:env(safe-area-inset-top);">
            <button class="icon-btn js-theme-toggle">🌙</button>
        </div>
        <div class="login-card slide-up">
            <div class="logo-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 20.23l8.78-8.78a5.5 5.5 0 0 0 0-7.78z"></path></svg></div>
            <h2 class="login-title">Welcome Back</h2>
            <p class="login-subtitle">Sign in to read your letters</p>
            <form onsubmit="app.login(event)">
                <input type="text" id="username" class="styled-input" placeholder="Username" autocomplete="off">
                <input type="password" id="password" class="styled-input" placeholder="Password">
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <div class="exclusive-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Exclusive Only For My Baby
            </div>
        </div>
    </div>

    <div id="app-view">
        <nav class="app-nav">
            <span style="font-weight: 800; font-size: 18px; letter-spacing: -0.5px;">Nicole's Book</span>
            <div class="nav-actions">
                <button class="icon-btn js-theme-toggle">🌙</button>
                <button class="icon-btn" onclick="app.logout()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </nav>
        <main class="container">
            <div class="hero-section">
                <h1 class="hero-title">Your Letters</h1>
                <p class="hero-sub">Every memory, kept safe for you.</p>
            </div>
            <div class="search-bar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Search a memory..." oninput="app.filter(this.value)">
            </div>
            <div id="card-list"></div>
        </main>
    </div>

    <div id="reader-view">
        <div class="reader-header">
            <button class="icon-btn" onclick="app.closeReader()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            
            <div style="text-align:center;">
                <span id="header-title" style="font-weight:700; font-size:14px;">Letter #1</span><br>
                <span id="header-counter" style="font-size:11px; color:var(--text-sub); opacity: 0.8;">1 of 80</span>
            </div>
            
            <button class="icon-btn js-theme-toggle">🌙</button>
        </div>
        
        <div class="reader-scroll-area">
            <div id="reader-card-content" class="letter-card-display">
                <div class="card-icon-large" id="r-icon"></div>
                <div class="letter-tag" id="r-tag">Letter #1</div>
                <h2 class="letter-title-large" id="r-title">Title</h2>
                <div class="letter-body-text" id="r-body">Body</div>
                <div class="letter-footer">Made with <span style="color:var(--primary); margin:0 4px;">❤</span> for you</div>
            </div>
        </div>
        
        <div class="reader-controls">
            <button class="control-btn" id="btn-prev" onclick="app.prevLetter()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg> Prev</button>
            <div class="pagination-dots" id="dots-container"></div>
            <button class="control-btn" id="btn-next" onclick="app.nextLetter()">Next <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
        </div>
    </div>

    <script>

        const icons = {

            heart: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78a5.5 5.5 0 0 0 0-7.78z"></path></svg>`,

        };

        // --- DATA ---
        const letters = [
            { id: 1, icon: 'gift', title: "When You First Receive This", content: "Hello baby! Happy Birthday! I hope you like ur gift. it's not that good but hope you like it." },
            { id: 2, icon: 'cloud', title: "When You Have A Bad Day", content: "This letter is for when you have a bad day. I want you to breathe for a moment and let this message hold you. You don't have to pretend to be strong or perfect right now. Just let yourself feel what you need to feel, and know that I'm right here with you." },
            { id: 3, icon: 'heart', title: "When You Miss Me", content: "Hello babyy, I know you're thinking of me right now, and I bet you miss me. Guess what? I miss you too, every single moment. Don't let yourself feel down, okay? Just know that distance doesn't change anything about how I feel for you." },
            { id: 4, icon: 'sun', title: "When You Need To Laugh", content: "HAHHAHAHAHAHHANHANHAN AHAHAHAHAHAHAHAAHAHAHA HHAHAAHAHAHAHAHAGAGAGA GAGAGAHAHAHAHAHAHAHAHAH AHHAHAAHAHAHAAHAHAHAHA HAHAHAHAHAHAHAHAHAHAHA HAHAHAHAHAHAHAHAHAHAA HHAHAHAHA" },

            { id: 7, icon: 'sun', title: "When You're Happy", content: "YAAY, my baby is feeling happy! good to hear it baby. Why you happy kaya? Siguro may na achieve kaa or nabili or may nangyaring maganda, okay na yan, atleast you're happy" },
            { id: 8, icon: 'cloud', title: "When You're Lonely", content: "Hello baby, I guess you opened this page because you're feeling lonely? My poor baby, please don't worry, I am right here with you, always. You never have to feel like you're alone." },

            { id: 22, icon: 'cloud', title: "When You Made A Mistake", content: "My babyy. If you are reading this, I know you made a mistake, and I know you probably feel bad about it right now. Please do not let it crush you, okay? Everyone makes mistakes." },

            { id: 26, icon: 'moon', title: "When You're Bored", content: "Hello babyy! I see you are bored, but that is totally fixable right now! Stop staring at the ceiling, okay? We need to find something fun for you to do immediately!" },
            { id: 27, icon: 'sun', title: "When You Need To Make A Big Decision", content: "My dearest babyy. If you are reading this, I know you have a huge decision on your mind, and I know how stressed that can make you. Please remember that whatever you choose will be right." },
            { id: 28, icon: 'cloud', title: "When You're Sick Of Social Media", content: "My dearest babyy. I know you are totally tired of all the noise and drama on social media right now. Please remember that all of that stuff is literally fake and none of it matters." },
            { id: 29, icon: 'sun', title: "When You Need Action", content: "Hello babyy! You need some action right now, huh? I totally love that energy! Whatever big goal you have, whether it's hitting the gym or finally starting that huge project." },

        // --- LOGIC ---
        const app = {
            currentIndex: 0,
            init() {
                const isDark = localStorage.getItem('theme') === 'dark';
                if (isDark) document.body.setAttribute('data-theme', 'dark');
                this.updateThemeIcons(isDark);
                
                document.querySelectorAll('.js-theme-toggle').forEach(btn => {
                    btn.addEventListener('click', () => this.toggleTheme());
                });

                if (sessionStorage.getItem('isLoggedIn') === 'true') this.showApp();
            },
            login(e) {
                e.preventDefault();
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                if (u === CREDENTIALS.username && p === CREDENTIALS.password) { 
                    sessionStorage.setItem('isLoggedIn', 'true'); 
                    this.showApp(); 
                }
                else { 
                    const c = document.querySelector('.login-card'); 
                    if(c){ c.classList.add('shake'); setTimeout(() => c.classList.remove('shake'), 300); } 
                    alert("Incorrect credentials!"); 
                }
            },
            logout() { 
                sessionStorage.removeItem('isLoggedIn'); 
                location.reload(); 
            },
            showApp() {
                const l = document.getElementById('login-view');
                if(l){ 
                    l.classList.add('fade-out'); 
                    setTimeout(() => { 
                        l.classList.add('hidden'); 
                        const a = document.getElementById('app-view'); 
                        if(a){ 
                            a.style.display = 'block'; 
                            a.classList.add('fade-in'); 
                            app.renderList(letters);
                        }
                    }, 300);
                }
            },
            getIcon(item) { 
                const raw = item.icon || item.type || 'heart'; 
                const clean = raw.replace(/['"""]/g, '').trim().toLowerCase();
                return icons[clean] || icons['heart']; 
            },
            renderList(data) {
                const list = document.getElementById('card-list'); 
                if(!list) return; 
                list.innerHTML = '';
                data.forEach((item, index) => {
                    const el = document.createElement('div'); 
                    el.className = 'card slide-up'; 
                    el.style.animationDelay = `${index * 0.03}s`;
                    const actualIndex = letters.indexOf(item);
                    el.onclick = () => this.openReader(actualIndex);
                    el.innerHTML = `<div class="list-icon">${this.getIcon(item)}</div><div style="flex:1;"><div style="font-weight:700;margin-bottom:4px;">${item.title}</div><div style="font-size:13px; opacity:0.7;">Letter #${item.id}</div></div>`;
                    list.appendChild(el);
                });
            },
            filter(val) { 
                this.renderList(letters.filter(l => l.title.toLowerCase().includes(val.toLowerCase()))); 
            },
            openReader(index) { 
                this.currentIndex = index; 
                this.updateReader(); 
                const r = document.getElementById('reader-view'); 
                if(r) r.classList.add('open'); 
            },
            closeReader() { 
                const r = document.getElementById('reader-view'); 
                if(r) r.classList.remove('open'); 
            },
            updateReader() {
                const item = letters[this.currentIndex];
                const card = document.getElementById('reader-card-content');
                card.style.opacity = '0'; 
                setTimeout(() => card.style.opacity = '1', 50);
                
                const set = (id, txt) => { const e = document.getElementById(id); if(e) e.innerText = txt; };
                set('header-title', `Letter #${item.id}`);
                set('header-counter', `${this.currentIndex + 1} of ${letters.length}`);
                set('r-tag', `Letter #${item.id}`);
                set('r-title', item.title);
                set('r-body', item.content);
                const iEl = document.getElementById('r-icon'); 
                if(iEl) iEl.innerHTML = this.getIcon(item);
                
                const bp = document.getElementById('btn-prev'), bn = document.getElementById('btn-next');
                if(bp) bp.disabled = this.currentIndex === 0;
                if(bn) bn.disabled = this.currentIndex === letters.length - 1;
                
                const dots = document.getElementById('dots-container');
                if(dots) { 
                    dots.innerHTML = ''; 
                    letters.forEach((_, i) => { 
                        if(i<5) { 
                            const d = document.createElement('div'); 
                            d.className = `dot ${i===this.currentIndex?'active':''}`; 
                            dots.appendChild(d); 
                        } 
                    }); 
                }
            },
            nextLetter() { 
                if (this.currentIndex < letters.length - 1) { 
                    this.currentIndex++; 
                    this.updateReader(); 
                } 
            },
            prevLetter() { 
                if (this.currentIndex > 0) { 
                    this.currentIndex--; 
                    this.updateReader(); 
                } 
            },
            toggleTheme() {
                const isDark = document.body.getAttribute('data-theme') === 'dark';
                const newMode = !isDark;
                if (newMode) { 
                    document.body.setAttribute('data-theme', 'dark'); 
                    localStorage.setItem('theme', 'dark'); 
                }
                else { 
                    document.body.removeAttribute('data-theme'); 
                    localStorage.setItem('theme', 'light'); 
                }
                this.updateThemeIcons(newMode);
            },
            updateThemeIcons(isDark) {
                const iconChar = isDark ? '☀️' : '🌙';
                document.querySelectorAll('.js-theme-toggle').forEach(btn => btn.innerText = iconChar);
            }
        };
        app.init();
    </script>
